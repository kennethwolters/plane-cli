name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: build release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Validate tag and source branch
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9._-]+)?$ ]]; then
            echo "Tag must look like v0.1.0 or v0.1.0-rc.1: $tag" >&2
            exit 1
          fi
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must point at commits contained in main." >&2
            exit 1
          fi

      - name: Test
        run: go test ./... -count=1

      - name: Build assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          commit="$(git rev-parse --short=12 HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${date}"
          mkdir -p dist build
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            name="plane-cli_${version}_${goos}_${goarch}"
            rm -rf "build/${name}"
            mkdir -p "build/${name}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "$ldflags" -o "build/${name}/plane-cli" .
            cp README.md LICENSE "build/${name}/"
            tar -C build -czf "dist/${name}.tar.gz" "${name}"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
